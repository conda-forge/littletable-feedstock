{% set name = "littletable" %}
{% set version = "3.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/littletable-{{ version }}.tar.gz
  sha256: 6c3c310344e0105eb5ca882443977d7aba83095daa25562af4621c95a5ea67ae

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools >=61
  run:
    - python >={{ python_min }}

test:
  imports:
    - littletable
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/ptmcg/littletable/
  summary: Python in-memory ORM database
  doc_url: https://pythonhosted.org/littletable/
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
